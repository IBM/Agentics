services:
  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    volumes:
      - ${KAFKA_DATA_DIR:-./kafka-data}:/var/lib/kafka/data
    user: "1000:1000"
    networks:
      - karapace

  karapace-schema-registry:
    image: ghcr.io/aiven-open/karapace:latest
    hostname: karapace-schema-registry
    container_name: karapace-schema-registry
    entrypoint:
      - python3
      - -m
      - karapace
    depends_on:
      - kafka
    ports:
      - "8081:8081"
    environment:
      KARAPACE_KARAPACE_REGISTRY: "true"
      KARAPACE_KARAPACE_REST: "false"
      KARAPACE_ADVERTISED_HOSTNAME: karapace-schema-registry
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_PORT: 8081
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_CLIENT_ID: karapace-schema-registry-0
      KARAPACE_GROUP_ID: karapace-schema-registry
      KARAPACE_MASTER_ELIGIBILITY: "true"
      KARAPACE_TOPIC_NAME: _schemas
      KARAPACE_LOG_LEVEL: INFO
      KARAPACE_COMPATIBILITY: BACKWARD
    networks:
      - karapace

  karapace-rest-proxy:
    image: ghcr.io/aiven-open/karapace:latest
    hostname: karapace-rest-proxy
    container_name: karapace-rest-proxy
    entrypoint:
      - python3
      - -m
      - karapace.kafka_rest_apis
    depends_on:
      - kafka
      - karapace-schema-registry
    ports:
      - "8082:8082"
    environment:
      KARAPACE_KARAPACE_REST: "true"
      KARAPACE_KARAPACE_REGISTRY: "false"
      KARAPACE_PORT: 8082
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_ADVERTISED_HOSTNAME: karapace-rest-proxy
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_REGISTRY_HOST: karapace-schema-registry
      KARAPACE_REGISTRY_PORT: 8081
      KARAPACE_LOG_LEVEL: INFO
    networks:
      - karapace

  schema-registry-ui:
    image: landoop/schema-registry-ui:latest
    platform: linux/amd64
    hostname: schema-registry-ui
    container_name: schema-registry-ui
    depends_on:
      - karapace-schema-registry
    ports:
      - "8000:8000"
    environment:
      SCHEMAREGISTRY_URL: http://karapace-schema-registry:8081
      PROXY: "true"
    networks:
      - karapace

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    hostname: kafka-ui
    container_name: kafka-ui
    depends_on:
      - kafka
      - karapace-schema-registry
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://karapace-schema-registry:8081
      DYNAMIC_CONFIG_ENABLED: 'true'
    networks:
      - karapace

  # Apache Flink JobManager (with Python support)
  flink-jobmanager:
    build:
      context: ../..
      dockerfile: tools/agstream_manager/Dockerfile.flink-python
    image: flink-python:1.18.1
    hostname: flink-jobmanager
    container_name: flink-jobmanager
    ports:
      - "8085:8081"  # Flink Web UI (mapped to 8085 to avoid conflict with Schema Registry on 8081)
    command: bash -c "cp /opt/flink-connectors/*.jar /opt/flink/lib/ 2>/dev/null || true && /docker-entrypoint.sh jobmanager"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        parallelism.default: 20
        taskmanager.numberOfTaskSlots: 20
        python.executable: /usr/bin/python3
        jobmanager.memory.off-heap.size: 4096m
        jobmanager.memory.jvm-metaspace.size: 1024m
        jobmanager.memory.jvm-overhead.max: 2048m
        jobmanager.memory.process.size: 8192m
        taskmanager.memory.jvm-metaspace.size: 1024m
        taskmanager.memory.jvm-overhead.max: 3072m
        taskmanager.memory.process.size: 8192m
        taskmanager.memory.managed.size: 2048m
      - PYTHONPATH=/opt/flink/udfs
      - AGSTREAM_INDEX_PATH=/opt/flink/indexes
      - CREWAI_TRACING_ENABLED=false
      - CREWAI_DISABLE_TELEMETRY=true
      - OTEL_SDK_DISABLED=true
      - CREWAI_SILENT=true
      - CREWAI_ALLOW_STACK_TRACES=false
      - CREWAI_DISABLE_TRACING=true
      - CREWAI_TRACING_DISABLED=true
    volumes:
      - ./flink-lib:/opt/flink-connectors
      - ./udfs:/opt/flink/udfs
      - ../../.env:/opt/flink/.env:ro
      - ../../src/agentics:/opt/flink/agentics:ro
      - ${AGSTREAM_INDEX_PATH:-./agstream_indexes}:/opt/flink/indexes
    networks:
      - karapace
    depends_on:
      - kafka

  # Apache Flink TaskManager (with Python support)
  flink-taskmanager:
    build:
      context: ../..
      dockerfile: tools/agstream_manager/Dockerfile.flink-python
    image: flink-python:1.18.1
    hostname: flink-taskmanager
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: bash -c "cp /opt/flink-connectors/*.jar /opt/flink/lib/ 2>/dev/null || true && /docker-entrypoint.sh taskmanager"
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 20
        parallelism.default: 20
        python.executable: /usr/bin/python3
        taskmanager.memory.jvm-metaspace.size: 1024m
        taskmanager.memory.jvm-overhead.max: 3072m
        taskmanager.memory.process.size: 8192m
        taskmanager.memory.managed.size: 2048m
      - PYTHONPATH=/opt/flink/udfs
      - AGSTREAM_INDEX_PATH=/opt/flink/indexes
      - CREWAI_TRACING_ENABLED=false
      - CREWAI_DISABLE_TELEMETRY=true
      - OTEL_SDK_DISABLED=true
      - CREWAI_SILENT=true
      - CREWAI_ALLOW_STACK_TRACES=false
      - CREWAI_DISABLE_TRACING=true
      - CREWAI_TRACING_DISABLED=true
    volumes:
      - ./flink-lib:/opt/flink-connectors
      - ./udfs:/opt/flink/udfs
      - ../../.env:/opt/flink/.env:ro
      - ../../src/agentics:/opt/flink/agentics:ro
      - ${AGSTREAM_INDEX_PATH:-./agstream_indexes}:/opt/flink/indexes
      - ${AGSTREAM_INDEX_PATH:-./agstream_indexes}:/opt/flink/indexes
    networks:
      - karapace

networks:
  karapace:
    name: karapace_network
    driver: bridge

