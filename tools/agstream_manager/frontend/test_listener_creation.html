<!DOCTYPE html>
<html>
<head>
    <title>Test Listener Creation</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 300px; padding: 8px; }
        button { padding: 10px 20px; margin: 10px 5px 0 0; cursor: pointer; }
        .btn-success { background: #10b981; color: white; border: none; }
        #output { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Test Listener Creation</h1>
    <p>This page tests the listener creation functionality in isolation.</p>

    <div class="form-group">
        <label for="listenerFunction">Function:</label>
        <select id="listenerFunction">
            <option value="">Loading...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="inputTopic">Input Topic:</label>
        <select id="inputTopic">
            <option value="">Loading...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="outputTopic">Output Topic:</label>
        <select id="outputTopic">
            <option value="">Loading...</option>
        </select>
    </div>

    <div class="form-group">
        <label for="lookbackMessages">Lookback Messages:</label>
        <input type="number" id="lookbackMessages" value="0" min="0">
    </div>

    <button class="btn-success" onclick="startListener()">▶️ Start Listener</button>

    <div id="output"></div>

    <script>
        const API_URL = 'http://localhost:5003/api';

        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(div);
            console.log(message);
        }

        // Load functions
        async function loadFunctions() {
            try {
                log('Loading functions...');
                const response = await fetch(`${API_URL}/transductions/functions`);
                const data = await response.json();

                const select = document.getElementById('listenerFunction');
                if (data.functions && data.functions.length > 0) {
                    select.innerHTML = '<option value="">Select a function...</option>' +
                        data.functions.map(f => `<option value="${f.name}">${f.name} (${f.source_type} → ${f.target_type})</option>`).join('');
                    log(`Loaded ${data.functions.length} function(s)`, 'success');
                } else {
                    select.innerHTML = '<option value="">No functions available</option>';
                    log('No functions found', 'error');
                }
            } catch (error) {
                log('Error loading functions: ' + error.message, 'error');
            }
        }

        // Load topics
        async function loadTopics() {
            try {
                log('Loading topics...');
                const response = await fetch(`${API_URL}/transductions/topics`);
                const data = await response.json();

                const inputSelect = document.getElementById('inputTopic');
                const outputSelect = document.getElementById('outputTopic');

                if (data.topics && data.topics.length > 0) {
                    const options = '<option value="">Select a topic...</option>' +
                        data.topics.map(t => `<option value="${t}">${t}</option>`).join('');
                    inputSelect.innerHTML = options;
                    outputSelect.innerHTML = options;
                    log(`Loaded ${data.topics.length} topic(s)`, 'success');
                } else {
                    inputSelect.innerHTML = '<option value="">No topics available</option>';
                    outputSelect.innerHTML = '<option value="">No topics available</option>';
                    log('No topics found', 'error');
                }
            } catch (error) {
                log('Error loading topics: ' + error.message, 'error');
            }
        }

        // Start listener
        async function startListener() {
            try {
                log('=== Starting listener ===');

                const functionName = document.getElementById('listenerFunction').value;
                const inputTopic = document.getElementById('inputTopic').value;
                const outputTopic = document.getElementById('outputTopic').value;
                const lookback = parseInt(document.getElementById('lookbackMessages').value) || 0;

                log(`Function: ${functionName}`);
                log(`Input: ${inputTopic}`);
                log(`Output: ${outputTopic}`);
                log(`Lookback: ${lookback}`);

                if (!functionName) {
                    log('ERROR: No function selected', 'error');
                    alert('Please select a function');
                    return;
                }

                if (!inputTopic || !outputTopic) {
                    log('ERROR: Topics not selected', 'error');
                    alert('Please select input and output topics');
                    return;
                }

                const payload = {
                    function_name: functionName,
                    input_topic: inputTopic,
                    output_topic: outputTopic,
                    lookback: lookback
                };

                log('Sending request to: ' + `${API_URL}/transductions/listeners`);
                log('Payload: ' + JSON.stringify(payload, null, 2));

                const response = await fetch(`${API_URL}/transductions/listeners`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                log(`Response status: ${response.status}`);

                const data = await response.json();
                log('Response data: ' + JSON.stringify(data, null, 2));

                if (data.success) {
                    log(`✅ SUCCESS! Listener created: ${data.listener_id}`, 'success');
                    alert(`Listener created successfully! ID: ${data.listener_id}`);
                } else {
                    log(`❌ FAILED: ${data.error}`, 'error');
                    alert(`Error: ${data.error}`);
                }
            } catch (error) {
                log(`❌ EXCEPTION: ${error.message}`, 'error');
                alert(`Error: ${error.message}`);
                console.error(error);
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            log('Page loaded, initializing...');
            loadFunctions();
            loadTopics();
        });
    </script>
</body>
</html>
